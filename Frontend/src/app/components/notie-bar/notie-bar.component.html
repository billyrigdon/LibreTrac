<div id="notie-bar">
	<h2>Notifications.</h2>
	<div class="horizontal-line"></div>
	<p *ngIf="this.stories.length === 0">All caught up!</p>
	<p *ngIf="this.stories.length > 0">You have comments:</p>
	<ul>
		<li *ngFor="let story of this.stories">
			<a (click)="this.goToStory(story.storyId)">{{story.title}}</a>
		</li>
	</ul>
</div>
