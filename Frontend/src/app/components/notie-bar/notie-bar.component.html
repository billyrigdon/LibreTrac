<div id="notie-bar">
	<h2>Notifications.</h2>
	<div class="horizontal-line"></div>
	<p *ngIf="this.noties.length === 0">All caught up!</p>
	<p *ngIf="this.noties.length > 0">You have comments:</p>
	<ul>
		<li *ngFor="let story of this.noties">
			<a (click)="this.goToStory(story.storyId, story.commentId)">{{story.title}}</a>
			<p>{{story.content}}</p>
		</li>
	</ul>
</div>
